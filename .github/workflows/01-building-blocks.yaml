name: 01 - Building Blocks

on: push  #whenever we push, execute this workflow

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps: 
            - name: Say hello
              run: echo "Hello, world!"

    echo-goodbye:
        runs-on: ubuntu-latest
        steps:
            - name: Failed step  #sth went wrong, the next step will not be executed by default
              run:  |
                 echo "I will fail"
                 exit 1
            - name: Say Goodbye
              run: echo "Goodbye!"       